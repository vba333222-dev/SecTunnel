import groovy.json.JsonSlurper

pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }

    def sdkPath = flutterSdkPath()
    includeBuild("$sdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
    id "com.android.application" version "8.6.0" apply false
    id "org.jetbrains.kotlin.android" version "2.1.0" apply false
}

include ":app"

def flutterProjectRoot = rootProject.projectDir.parentFile.toPath()

def pluginsFile = new File(flutterProjectRoot.toFile(), ".flutter-plugins-dependencies")
if (pluginsFile.exists()) {
    def object = new JsonSlurper().parseText(pluginsFile.text)
    def androidPlugins = object.plugins.android
    androidPlugins.each { plugin ->
        def name = plugin.name
        def path = plugin.path
        include ":$name"
        project(":$name").projectDir = new File(path, "android")
    }
}
